<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edu IA 360° | Transformación Educativa</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-in-out forwards',
                        'float': 'float 3s ease-in-out infinite',
                    }
                }
            }
        };
    </script>

    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        body { background-color: #0f172a; color: white; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">

    <nav class="fixed w-full z-50 bg-slate-900/80 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <span class="text-xl font-bold text-cyan-400">Edu IA 360°</span>
            <button class="bg-cyan-500 text-slate-900 px-4 py-2 rounded-full text-sm font-bold">Consultoría</button>
        </div>
    </nav>

    <section class="pt-40 pb-20 px-4 max-w-7xl mx-auto text-center">
        <div class="animate-fade-in">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-8">
                IA integral para <br>
                <span class="text-cyan-400">docentes y escuelas</span>
            </h1>
            <p class="text-xl text-gray-400 mb-10 max-w-2xl mx-auto">
                "Más tiempo, clases más activas y evidencias de aprendizaje en 8 semanas"
            </p>
            <div class="flex justify-center gap-4">
                <button class="bg-cyan-500 px-8 py-4 rounded-xl font-bold text-slate-900">Ver Propuesta</button>
                <button class="bg-white/10 px-8 py-4 rounded-xl font-bold border border-white/10">Diagnóstico IA</button>
            </div>
        </div>
    </section>

    <footer class="py-12 border-t border-white/5 text-center text-gray-500">
        <p>© 2026 Edu IA 360° | Estratega de IA</p>
    </footer>

    <script defer src="https://analyticsplusdev.clientify.net/analytics_plus/pixel/jiGqiYa4Sko2WdQA"></script>
    </body>
</html>
